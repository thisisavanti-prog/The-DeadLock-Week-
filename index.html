<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeadLock Tracker</title>
    <style>
        :root {
            /* Exact Hex values for Pantone 448C and Custom Vantage Cobalt Blue */
            --pantone-start: #4A412A; 
            --cobalt-end: #00E5FF;
            --void-dark: #0D001A;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace; /* Industrial/Code feel */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.8s ease-in-out;
            /* Default initialization state: The Sludge */
            background: linear-gradient(135deg, var(--pantone-start), #2B2518);
        }

        .tracker-panel {
            background: rgba(13, 0, 26, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 24px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            color: #E0E0E0;
        }

        h2 {
            margin-top: 0;
            letter-spacing: 2px;
            color: #FFF;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }

        .task-input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px;
            color: #FFF;
            border-radius: 6px;
        }

        button {
            background: #00E5FF;
            border: none;
            color: #000;
            font-weight: bold;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            gap: 12px;
        }

        .task-item.completed {
            text-decoration: line-through;
            color: #00E5FF;
            opacity: 0.6;
        }

        input[type="checkbox"] {
            transform: scale(1.3);
            accent-color: #00E5FF;
            cursor: pointer;
        }

        .progress-bar-container {
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            height: 8px;
            width: 0%;
            background: #00E5FF;
            transition: width 0.4s ease;
        }
    </style>
</head>
<body>

<div class="tracker-panel">
    <h2>// DEADLOCK.WEEK</h2>
    
    <!-- Customization Config Layer -->
    <div class="task-input-row">
        <input type="text" id="task-input" placeholder="Configure new objective...">
        <button onclick="addTask()">+ ADD</button>
    </div>

    <!-- Spreadsheet-style Checklist Matrix -->
    <div id="task-list"></div>

    <!-- Progress Telemetry -->
    <div style="margin-top: 20px; display: flex; justify-content: space-between;">
        <span>ACCEDING STATUS:</span>
        <span id="progress-text">0%</span>
    </div>
    <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>
</div>

<script>
    // System initialization with your 5 main quests
    let tasks = JSON.parse(localStorage.getItem('deadlock_tasks')) || [
        { id: 1, text: "Pray 5 times a day", completed: false },
        { id: 2, text: "No Fap", completed: false },
        { id: 3, text: "Complete Block-1 exam syllabi", completed: false },
        { id: 4, text: "Exercise everyday (Progressive Overload)", completed: false },
        { id: 5, text: "Complete academic projects/assignments", completed: false }
    ];

    function renderTasks() {
        const listContainer = document.getElementById('task-list');
        listContainer.innerHTML = '';
        
        tasks.forEach(task => {
            const row = document.createElement('div');
            row.className = `task-item ${task.completed ? 'completed' : ''}`;
            row.innerHTML = `
                <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})">
                <span style="flex: 1;">${task.text}</span>
                <span style="cursor:pointer; color: #FF5252;" onclick="deleteTask(${task.id})">×</span>
            `;
            listContainer.appendChild(row);
        });
        
        updateTelemetry();
        localStorage.setItem('deadlock_tasks', JSON.stringify(tasks));
    }

    function addTask() {
        const input = document.getElementById('task-input');
        if (input.value.trim() === '') return;
        
        const newTask = {
            id: Date.now(),
            text: input.value.trim(),
            completed: false
        };
        
        tasks.push(newTask);
        input.value = '';
        renderTasks();
    }

    function toggleTask(id) {
        tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
        renderTasks();
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        renderTasks();
    }

    // Hex to RGB Helper for gradient mathematical blending
    function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? {
            r: parseInt(result[1], 16),
            g: parseInt(result[2], 16),
            b: parseInt(result[3], 16)
        } : null;
    }

    function updateTelemetry() {
        if (tasks.length === 0) return;
        const completedCount = tasks.filter(t => t.completed).length;
        const percentage = Math.round((completedCount / tasks.length) * 100);
        
        document.getElementById('progress-text').innerText = `${percentage}%`;
        document.getElementById('progress-bar').style.width = `${percentage}%`;
        
        // Compute Linear Interpolation for background color shift
        const startColor = hexToRgb('#4A412A'); // Pantone 448C Sludge
        const endColor = hexToRgb('#00E5FF');   // Vantage Cobalt Blue
        
        const r = Math.round(startColor.r + (endColor.r - startColor.r) * (percentage / 100));
        const g = Math.round(startColor.g + (endColor.g - startColor.g) * (percentage / 100));
        const b = Math.round(startColor.b + (endColor.b - startColor.b) * (percentage / 100));
        
        // Shift from dull, dead mud to vibrant, high-frequency cyber glow
        document.body.style.background = `linear-gradient(135deg, rgb(${r},${g},${b}), #0D001A)`;
    }

    // Initial Engine Boot
    renderTasks();
</script>
</body>
  </html>
